# Hardware keys (XF86*) and physical controls

# @Volume
bindsym XF86AudioRaiseVolume exec $volume up
bindsym XF86AudioLowerVolume exec $volume down
bindsym XF86AudioMute exec $volume mute

# @Microphone
bindsym XF86AudioMicMute exec $volume mic-mute

# @Media
bindsym $mod+p exec $media play-pause
bindsym $mod+period exec $media next
bindsym $mod+comma exec $media prev

# @Brightness
bindsym XF86MonBrightnessUp exec $brightness up
bindsym XF86MonBrightnessDown exec $brightness down

# @Touchpad
bindsym XF86TouchpadToggle input type:touchpad events toggle enabled disabled

# @Launcher 
bindsym XF86Launch1 exec $menu

# @Screenshots
bindsym Print exec $screenshot full
bindsym $mod+Shift+s exec $screenshot selection
